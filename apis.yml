aid: department-of-homeland-security
name: Department of Homeland Security
description: >-
  The U.S. Department of Homeland Security (DHS) is a cabinet-level federal
  agency responsible for protecting the nation from terrorism, securing
  borders, enforcing immigration law, responding to disasters, and securing
  cyberspace. DHS exposes APIs across its operational components, including
  FEMA's OpenFEMA platform, USCIS's Developer Portal, the CISA Known
  Exploited Vulnerabilities catalog, the National Terrorism Advisory System
  (NTAS) feed, and the DHS Open Data Catalog.
type: Index
